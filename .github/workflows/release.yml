name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            IS_RELEASE=true
          else
            VERSION="0.0.0-${GITHUB_SHA::8}"
            IS_RELEASE=false
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT

      - name: Create release
        if: steps.version.outputs.is_release == 'true'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          gh release create $TAG \
            --title "Terraform Provider Cloudflare $TAG" \
            --notes "Release $TAG" \
            --repo ${{ github.repository }} || true

      - name: Create release (dev)
        if: steps.version.outputs.is_release == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          gh release create $TAG \
            --title "Terraform Provider Cloudflare $TAG (dev)" \
            --notes "Development build" \
            --repo ${{ github.repository }} || true

      - name: Create manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo '{"version": 1, "metadata": {"protocol_versions": ["6.0"]}}' > terraform-provider-cloudflare_${VERSION}_manifest.json

      - name: Upload manifest
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          pwd
          ls -la terraform-provider-cloudflare_${VERSION}_manifest.json || echo "File not found"
          gh release upload $TAG terraform-provider-cloudflare_${VERSION}_manifest.json --repo ${{ github.repository }}

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: windows
            arch: amd64
            runner: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go.sum

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download Go modules
        run: go mod download

      - name: Build
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          BINARY_NAME="terraform-provider-cloudflare_${VERSION}_${GOOS}_${GOARCH}"
          if [[ "$GOOS" == "windows" ]]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          GO111MODULE=on CGO_ENABLED=0 go build -ldflags "-s -w -X main.version=${VERSION}" -o "$BINARY_NAME" .
          zip "${BINARY_NAME}.zip" "$BINARY_NAME"

      - name: Upload artifact
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ github.ref_name }}
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          BINARY_NAME="terraform-provider-cloudflare_${VERSION}_${GOOS}_${GOARCH}"
          if [[ "$GOOS" == "windows" ]]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          gh release upload $TAG "${BINARY_NAME}.zip" --repo ${{ github.repository }}

  checksums:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Download all artifacts
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          mkdir -p dist
          cd dist
          for asset in terraform-provider-cloudflare_${VERSION}_*.zip; do
            gh release download $TAG --pattern "$asset" --repo ${{ github.repository }}
          done

      - name: Create checksums
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        working-directory: dist
        run: |
          sha256sum terraform-provider-cloudflare_${VERSION}_*.zip > terraform-provider-cloudflare_${VERSION}_SHA256SUMS

      - name: Sign checksums
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          VERSION: ${{ needs.prepare.outputs.version }}
        working-directory: dist
        run: |
          gpg --batch --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" --armor --detach-sign --local-user "${GPG_FINGERPRINT}" terraform-provider-cloudflare_${VERSION}_SHA256SUMS

      - name: Upload checksums
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
        working-directory: dist
        run: |
          gh release upload $TAG terraform-provider-cloudflare_${VERSION}_SHA256SUMS terraform-provider-cloudflare_${VERSION}_SHA256SUMS.asc --repo ${{ github.repository }}
